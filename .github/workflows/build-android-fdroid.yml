name: Build Android F-Droid APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android_fdroid_apk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://npm.pkg.github.com"
          scope: "@tetherto"

      - name: Install dependencies
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          npm install --install-links --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Generate worklet bundles and translations
        run: npm run build

      - name: Expo prebuild (Android, fdroid)
        env:
          PEARPASS_DISTRIBUTION: fdroid
        run: npx expo prebuild --platform android --clean --no-install

      - name: Assemble F-Droid release APK
        env:
          PEARPASS_DISTRIBUTION: fdroid
        run: |
          cd android
          GRADLE_USER_HOME=/tmp/pearpass-gradle-home ./gradlew :app:assembleFdroidRelease --no-daemon -Dorg.gradle.vfs.watch=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PearPass-Android-fdroid-release.apk
          path: android/app/build/outputs/apk/fdroid/release/app-fdroid-release.apk
          if-no-files-found: error

